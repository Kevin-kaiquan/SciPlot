name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/check_release_version.py "${{ github.ref_name }}"

      - name: Build SciPlot
        shell: pwsh
        run: .\build_exe.ps1

      - name: Validate packaged app
        shell: pwsh
        run: |
          $env:SCIPLOT_APP_DATA_DIR = Join-Path $env:RUNNER_TEMP "sciplot-smoke"
          $env:QT_QPA_PLATFORM = "offscreen"
          New-Item -ItemType Directory -Path $env:SCIPLOT_APP_DATA_DIR -Force | Out-Null
          foreach ($argument in @("--smoke-test", "--gui-smoke", "--startup-smoke")) {
            $process = Start-Process -FilePath ".\dist\SciPlot\SciPlot.exe" -ArgumentList $argument -Wait -PassThru
            if ($process.ExitCode -ne 0) {
              $log = Join-Path $env:SCIPLOT_APP_DATA_DIR "runtime\startup_error.log"
              if (Test-Path $log) {
                Get-Content $log
              }
              throw "Packaged SciPlot $argument failed with exit code $($process.ExitCode)."
            }
          }

      - name: Remove smoke-test state
        shell: pwsh
        run: |
          foreach ($name in @("exports", "runtime", "projects", "templates", "updates")) {
            $path = Join-Path "dist\SciPlot" $name
            if (Test-Path $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }
          foreach ($name in @("last_session.json", "settings.ini")) {
            $path = Join-Path "dist\SciPlot" $name
            if (Test-Path $path) {
              Remove-Item -LiteralPath $path -Force
            }
          }

      - name: Package Windows portable build
        shell: pwsh
        run: Compress-Archive -Path dist\SciPlot\* -DestinationPath SciPlot-Windows-x64.zip -Force

      - name: Build Windows MSI
        shell: pwsh
        run: .\scripts\build_msi.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SciPlot-Windows-x64
          path: |
            SciPlot-Windows-x64.zip
            dist/SciPlot-Windows-x64.msi

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            dmg: SciPlot-macOS-arm64.dmg
            artifact: SciPlot-macOS-arm64
          - arch: intel
            runner: macos-15-intel
            dmg: SciPlot-macOS-intel.dmg
            artifact: SciPlot-macOS-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/check_release_version.py "${{ github.ref_name }}"

      - name: Prepare app icons
        run: python scripts/prepare_icons.py

      - name: Build SciPlot.app
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "SciPlot" \
            --icon "logo/SciPlot.icns" \
            --osx-bundle-identifier "io.github.kevin-kaiquan.sciplot" \
            --hidden-import "matplotlib.backends.backend_qtagg" \
            --hidden-import "matplotlib.backends.backend_agg" \
            --hidden-import "matplotlib.backends.backend_pdf" \
            --hidden-import "matplotlib.backends.backend_svg" \
            --hidden-import "scipy.stats" \
            --hidden-import "PySide6.QtSvg" \
            --hidden-import "openpyxl" \
            --hidden-import "xlrd" \
            --exclude-module "tkinter" \
            --distpath dist \
            --workpath build \
            --specpath . \
            --add-data "sample_data:sample_data" \
            --add-data "templates:templates" \
            --add-data "logo:logo" \
            src/sciplot_launcher.py
          cp README.md dist/README.md
          cp -R docs dist/docs
          cp -R sample_data dist/sample_data
          cp -R templates dist/templates
          cp -R logo dist/logo

      - name: Validate packaged app
        run: |
          export SCIPLOT_APP_DATA_DIR="${RUNNER_TEMP}/sciplot-smoke-${{ matrix.arch }}"
          export QT_QPA_PLATFORM=offscreen
          mkdir -p "$SCIPLOT_APP_DATA_DIR"
          dist/SciPlot.app/Contents/MacOS/SciPlot --smoke-test
          dist/SciPlot.app/Contents/MacOS/SciPlot --gui-smoke
          dist/SciPlot.app/Contents/MacOS/SciPlot --startup-smoke

      - name: Package macOS DMG
        run: |
          mkdir -p dmg-root
          cp -R dist/SciPlot.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "SciPlot" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "${{ matrix.dmg }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dmg }}

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Collect release assets and generate checksums
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from shutil import copy2

          expected = {
              "SciPlot-Windows-x64.msi",
              "SciPlot-Windows-x64.zip",
              "SciPlot-macOS-arm64.dmg",
              "SciPlot-macOS-intel.dmg",
          }
          sources = [path for path in Path("release-assets").rglob("*") if path.is_file()]
          by_name = {path.name: path for path in sources}
          if len(by_name) != len(sources) or set(by_name) != expected:
              raise SystemExit(f"Unexpected release assets: {sorted(path.name for path in sources)}")

          destination = Path("release-files")
          destination.mkdir()
          checksum_lines = []
          for name in sorted(expected):
              output = destination / name
              copy2(by_name[name], output)
              checksum_lines.append(f"{sha256(output.read_bytes()).hexdigest()}  {name}\n")
          (destination / "SHA256SUMS.txt").write_text("".join(checksum_lines), encoding="ascii")
          PY

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
