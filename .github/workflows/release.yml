name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build SciPlot
        shell: pwsh
        run: .\build_exe.ps1

      - name: Validate packaged app
        shell: pwsh
        run: |
          $env:SCIPLOT_APP_DATA_DIR = Join-Path $env:RUNNER_TEMP "sciplot-smoke"
          New-Item -ItemType Directory -Path $env:SCIPLOT_APP_DATA_DIR -Force | Out-Null
          .\dist\SciPlot\SciPlot.exe --smoke-test
          .\dist\SciPlot\SciPlot.exe --gui-smoke

      - name: Remove smoke-test state
        shell: pwsh
        run: |
          foreach ($name in @("exports", "runtime", "user_data")) {
            $path = Join-Path "dist\SciPlot" $name
            if (Test-Path $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }
          foreach ($name in @("last_session.json", "last_session.tmp")) {
            $path = Join-Path "dist\SciPlot" $name
            if (Test-Path $path) {
              Remove-Item -LiteralPath $path -Force
            }
          }

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path dist\SciPlot\* -DestinationPath SciPlot-Windows-x64.zip -Force

      - name: Build Windows MSI
        shell: pwsh
        run: .\scripts\build_msi.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SciPlot-Windows-x64
          path: |
            SciPlot-Windows-x64.zip
            dist/SciPlot-Windows-x64.msi

      - name: Attach Windows build to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SciPlot-Windows-x64.zip
            dist/SciPlot-Windows-x64.msi

  build-macos:
    name: Build macOS app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            dmg: SciPlot-macOS-arm64.dmg
            artifact: SciPlot-macOS-arm64
          - arch: intel
            runner: macos-15-intel
            dmg: SciPlot-macOS-intel.dmg
            artifact: SciPlot-macOS-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare app icons
        run: python scripts/prepare_icons.py

      - name: Build SciPlot.app
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "SciPlot" \
            --icon "logo/SciPlot.icns" \
            --hidden-import "matplotlib.backends.backend_agg" \
            --hidden-import "matplotlib.backends.backend_pdf" \
            --hidden-import "matplotlib.backends.backend_ps" \
            --hidden-import "matplotlib.backends.backend_svg" \
            --hidden-import "openpyxl" \
            --hidden-import "xlrd" \
            --distpath dist \
            --workpath build \
            --specpath . \
            --add-data "sample_data:sample_data" \
            --add-data "templates:templates" \
            --add-data "logo:logo" \
            src/sciplot_launcher.py
          cp README.md dist/README.md
          cp -R docs dist/docs
          cp -R sample_data dist/sample_data
          cp -R templates dist/templates
          cp -R logo dist/logo

      - name: Package macOS DMG
        run: |
          mkdir -p dmg-root
          cp -R dist/SciPlot.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "SciPlot" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "${{ matrix.dmg }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dmg }}

      - name: Attach macOS build to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.dmg }}
